general {
    ignore_empty_input = true
}

auth {
    pam {
        module = system-local-login
    }

    fingerprint {
        enabled = true
    }
}

animations {
    enabled = true
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    animation = fade, 1, 2, smoothOut
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 5
}

label {
    text = $TIME
    font_size = 128

    color = rgba(255, 255, 255, 1.0)
    shadow_color = rgba(25, 25, 25, 0.8)
    shadow_passes = 2
    shadow_size = 1

    position = 0, 50
    halign = center
    valign = center
}

label {
    text = $FPRINTPROMPT
    font_size = 16

    position = 0, -130
    halign = center
    valign = center
}

input-field {
    size = 300, 48
    outline_thickness = 3
    outer_color = rgba(123, 123, 123, 0.8)
    inner_color = rgba(123, 123, 123, 0.5)
    font_color = rgb(126, 126, 126)
    check_color = rgba(212, 212, 212, 0.7)
    fail_color = rgba(212, 34, 34, 0.3)
    fade_on_empty = true
    hide_input = false
    fade_timeout = 10000
    placeholder_text = $PAMPROMPT

    position = 0, -75
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] acpi
    font_size = 10

    position = 0, 15
    valign = bottom
    halign = center
}
