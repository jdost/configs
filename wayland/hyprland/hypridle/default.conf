general {
    lock_cmd = ""
    before_sleep_cmd = ""
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action="enable" })' &>/dev/null # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 600                                      # 10min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action="disable" })' &>/dev/null # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action="enable" })' &>/dev/null   # screen on when activity is detected after timeout has fired.
}
